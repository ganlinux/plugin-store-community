# Phase 2: Structural Validation
# Runs on every PR that touches submissions/ — validates plugin.yaml schema,
# naming, license, file sizes, permissions, SKILL.md frontmatter.

name: "Phase 2: Structure Validation"

on:
  pull_request:
    paths:
      - 'submissions/**'
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-plugin:
    name: Detect changed plugin
    runs-on: ubuntu-latest
    outputs:
      plugin_dir: ${{ steps.find.outputs.plugin_dir }}
      plugin_name: ${{ steps.find.outputs.plugin_name }}
      is_new: ${{ steps.find.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed plugin directory
        id: find
        run: |
          # Get list of changed files in submissions/
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'submissions/' | head -100)

          if [ -z "$CHANGED" ]; then
            echo "No changes in submissions/"
            exit 1
          fi

          # Extract the plugin directory name (first path component under submissions/)
          PLUGIN_NAME=$(echo "$CHANGED" | head -1 | cut -d'/' -f2)
          PLUGIN_DIR="submissions/${PLUGIN_NAME}"

          echo "plugin_dir=${PLUGIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "plugin_name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"

          # Check if this is a new plugin or an update
          if git show origin/main:"${PLUGIN_DIR}/plugin.yaml" > /dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Plugin: ${PLUGIN_NAME} (dir: ${PLUGIN_DIR})"

      - name: Verify PR only modifies one plugin
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'submissions/')
          DIRS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u)
          COUNT=$(echo "$DIRS" | wc -l | tr -d ' ')

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::PR modifies multiple plugins: $(echo $DIRS | tr '\n' ', '). Please submit one plugin per PR."
            exit 1
          fi

      - name: Verify PR does not modify files outside submissions/
        run: |
          OUTSIDE=$(git diff --name-only origin/main...HEAD | grep -v '^submissions/' || true)
          if [ -n "$OUTSIDE" ]; then
            echo "::error::PR modifies files outside submissions/: ${OUTSIDE}. Only submissions/ changes are allowed."
            exit 1
          fi

  lint:
    name: Structure validation
    needs: detect-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Install plugin-store CLI
        run: |
          # Install from the plugin-store repo
          cargo install --git https://github.com/yz06276/plugin-store.git --branch feat/submission-pipeline

      - name: Run lint
        id: lint
        run: |
          set +e
          OUTPUT=$(plugin-store lint "${{ needs.detect-plugin.outputs.plugin_dir }}" 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          # Save output for PR comment
          {
            echo 'lint_output<<LINT_EOF'
            echo "$OUTPUT"
            echo 'LINT_EOF'
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Add labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isNew = '${{ needs.detect-plugin.outputs.is_new }}' === 'true';
            const passed = '${{ steps.lint.outputs.exit_code }}' === '0';

            // Add type label
            const typeLabel = isNew ? 'new-plugin' : 'plugin-update';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [typeLabel]
            });

            // Add result label
            if (passed) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['structure-validated']
              });
              // Remove needs-fix if present
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'needs-fix'
                });
              } catch (e) { /* label not present */ }
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['needs-fix']
              });
              // Remove structure-validated if present
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'structure-validated'
                });
              } catch (e) { /* label not present */ }
            }

      - name: Post lint report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.lint.outputs.lint_output }}`.replace(/`/g, '\\`');
            const passed = '${{ steps.lint.outputs.exit_code }}' === '0';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'PASSED' : 'FAILED';

            const body = `## ${icon} Phase 2: Structure Validation — ${status}

            \`\`\`
            ${output}
            \`\`\`

            ${passed ? '→ Proceeding to Phase 3: AI Code Review' : '→ Please fix the errors above and push again.'}
            `;

            // Find existing bot comment to update (avoid spam)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Phase 2: Structure Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Fail if lint errors
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1
