# Phase 7: Auto-publish
# After a PR is merged to main, this workflow:
# 1. Scans all submissions/*/plugin.yaml
# 2. Generates registry.json entries for each
# 3. Pushes updated registry.json to the plugin-store repo
# 4. Creates a git tag for the plugin version

name: "Phase 7: Publish"

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**'

permissions:
  contents: write

jobs:
  publish:
    name: Generate registry and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        run: |
          # Find which plugins were changed in the last merge commit
          CHANGED=$(git diff --name-only HEAD~1...HEAD -- 'submissions/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No plugin changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLUGINS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u)
          echo "changed_plugins=${PLUGINS}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${PLUGINS}"

      - name: Install yq
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate registry entries from submissions
        if: steps.detect.outputs.has_changes == 'true'
        id: generate
        run: |
          # Build a JSON array of community plugin entries from all submissions
          ENTRIES="[]"

          for PLUGIN_DIR in submissions/*/; do
            YAML_FILE="${PLUGIN_DIR}plugin.yaml"
            [ -f "$YAML_FILE" ] || continue

            NAME=$(yq '.name' "$YAML_FILE")
            [ "$NAME" = "_example-plugin" ] && continue

            VERSION=$(yq '.version' "$YAML_FILE")
            DESC=$(yq '.description' "$YAML_FILE")
            AUTHOR_NAME=$(yq '.author.name' "$YAML_FILE")
            ALIAS=$(yq '.alias // ""' "$YAML_FILE")
            CATEGORY=$(yq '.category' "$YAML_FILE")
            TAGS=$(yq '.tags | @json' "$YAML_FILE")

            # Skill component
            SKILL_DIR=$(yq '.components.skill.dir // .components.skills[0].dir // ""' "$YAML_FILE")
            SKILL_REPO="okx/plugin-store-community"
            COMMIT_SHA=$(git rev-parse HEAD)

            # Build config (for binary plugins)
            BUILD_LANG=$(yq '.build.lang // ""' "$YAML_FILE")
            BUILD_SOURCE_REPO=$(yq '.build.source_repo // ""' "$YAML_FILE")
            BUILD_SOURCE_COMMIT=$(yq '.build.source_commit // ""' "$YAML_FILE")
            BUILD_BINARY_NAME=$(yq '.build.binary_name // ""' "$YAML_FILE")

            # Binary component
            BINARY_REPO=$(yq '.components.binary.repo // ""' "$YAML_FILE")
            BINARY_PATTERN=$(yq '.components.binary.asset_pattern // ""' "$YAML_FILE")
            BINARY_CHECKSUMS=$(yq '.components.binary.checksums_asset // ""' "$YAML_FILE")

            # Build the registry entry with all components
            ENTRY=$(YAML_FILE="$YAML_FILE" BUILD_LANG="$BUILD_LANG" BUILD_SOURCE_REPO="$BUILD_SOURCE_REPO" \
              BUILD_SOURCE_COMMIT="$BUILD_SOURCE_COMMIT" BUILD_BINARY_NAME="$BUILD_BINARY_NAME" \
              BINARY_REPO="$BINARY_REPO" BINARY_PATTERN="$BINARY_PATTERN" BINARY_CHECKSUMS="$BINARY_CHECKSUMS" \
              python3 << 'PYEOF'
          import json, os
          entry = {
              "name": os.popen(f"yq '.name' {os.environ['YAML_FILE']}").read().strip(),
              "version": os.popen(f"yq '.version' {os.environ['YAML_FILE']}").read().strip(),
              "description": os.popen(f"yq '.description' {os.environ['YAML_FILE']}").read().strip(),
              "author": {"name": os.popen(f"yq '.author.name' {os.environ['YAML_FILE']}").read().strip()},
              "category": os.popen(f"yq '.category' {os.environ['YAML_FILE']}").read().strip(),
              "tags": json.loads(os.popen(f"yq '.tags | @json' {os.environ['YAML_FILE']}").read().strip()),
              "type": "community-developer",
              "components": {
                  "skill": {
                      "repo": "okx/plugin-store-community",
                      "dir": os.popen(f"yq '.components.skill.dir // .components.skills[0].dir // \"\"' {os.environ['YAML_FILE']}").read().strip(),
                      "commit": os.popen("git rev-parse HEAD").read().strip()
                  }
              },
              "link": "https://github.com/okx/plugin-store-community"
          }
          alias_val = os.popen(f"yq '.alias // \"\"' {os.environ['YAML_FILE']}").read().strip()
          if alias_val:
              entry["alias"] = alias_val
          # Add build config if present
          if os.environ.get("BUILD_LANG"):
              entry["build"] = {
                  "lang": os.environ["BUILD_LANG"],
                  "source_repo": os.environ["BUILD_SOURCE_REPO"],
                  "source_commit": os.environ["BUILD_SOURCE_COMMIT"],
                  "binary_name": os.environ["BUILD_BINARY_NAME"]
              }
          # Add binary component if present
          if os.environ.get("BINARY_REPO"):
              entry["components"]["binary"] = {
                  "repo": os.environ["BINARY_REPO"],
                  "asset_pattern": os.environ["BINARY_PATTERN"]
              }
              if os.environ.get("BINARY_CHECKSUMS"):
                  entry["components"]["binary"]["checksums_asset"] = os.environ["BINARY_CHECKSUMS"]
          print(json.dumps(entry))
          PYEOF
            )

            ENTRIES=$(echo "$ENTRIES" | jq --argjson entry "$ENTRY" '. + [$entry]')
          done

          echo "$ENTRIES" > /tmp/community_entries.json
          echo "Generated $(echo "$ENTRIES" | jq length) community plugin entries"

      - name: Create git tags for changed plugins
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          for PLUGIN_NAME in ${{ steps.detect.outputs.changed_plugins }}; do
            YAML_FILE="submissions/${PLUGIN_NAME}/plugin.yaml"
            [ -f "$YAML_FILE" ] || continue
            [ "$PLUGIN_NAME" = "_example-plugin" ] && continue

            VERSION=$(yq '.version' "$YAML_FILE")
            TAG="plugins/${PLUGIN_NAME}@${VERSION}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
            else
              git tag "$TAG"
              echo "Created tag: $TAG"
            fi
          done

          git push --tags || true

      - name: Upload community entries artifact
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: community-registry-entries
          path: /tmp/community_entries.json

      - name: Update registry in plugin-store repo
        if: steps.detect.outputs.has_changes == 'true'
        env:
          PLUGIN_STORE_TOKEN: ${{ secrets.PLUGIN_STORE_TOKEN }}
        run: |
          # Clone the plugin-store repo
          git clone --depth=1 "https://x-access-token:${PLUGIN_STORE_TOKEN}@github.com/okx/plugin-store.git" /tmp/plugin-store

          cd /tmp/plugin-store

          # Read current registry.json
          CURRENT=$(cat registry.json)

          # Get non-community plugins (okx-official, verified-third-party)
          OFFICIAL=$(echo "$CURRENT" | jq '[.plugins[] | select(.type != "community-developer" and .type != "community")]')

          # Get new community entries
          COMMUNITY=$(cat /tmp/community_entries.json)

          # Merge: official + community
          MERGED=$(jq -n \
            --argjson official "$OFFICIAL" \
            --argjson community "$COMMUNITY" \
            --arg stats_url "$(echo "$CURRENT" | jq -r '.stats_url // ""')" \
            '{
              schema_version: 1,
              stats_url: $stats_url,
              plugins: ($official + $community)
            }')

          echo "$MERGED" | jq '.' > registry.json

          # Commit and push
          git config user.name "plugin-store-bot"
          git config user.email "bot@plugin-store.local"
          git add registry.json
          git diff --staged --quiet && echo "No registry changes" && exit 0

          git commit -m "Update registry.json with community plugins

          Auto-generated from plugin-store-community submissions."
          git push
          echo "Registry updated successfully"
