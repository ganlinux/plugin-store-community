schema_version: 1
name: treehouse-protocol
version: "0.1.0"
description: "Deposit ETH/WETH/stETH/wstETH for tETH yield on Ethereum, or AVAX/sAVAX for tAVAX yield on Avalanche via Treehouse Protocol"
author:
  name: "skylavis-sky"
  github: "skylavis-sky"
category: defi-protocol
tags:
  - staking
  - yield
  - ethereum
  - avalanche
  - liquid-staking
license: MIT

components:
  skill:
    dir: skills/treehouse-protocol

build:
  lang: rust
  binary_name: treehouse-protocol
  source_repo: skylavis-sky/onchainos-plugins
  source_commit: "c74e8a3718100f9f61d2433a088b73dfcbb8408a"
  source_dir: treehouse-protocol

api_calls:
  - "https://rpc.mevblocker.io"
  - "https://mainnet.gateway.tenderly.co"
  - "https://ethereum-rpc.publicnode.com"
  - "https://api.avax.network/ext/bc/C/rpc"
  - "https://avalanche-c-chain-rpc.publicnode.com"
  - "https://yields.llama.fi/pools"
